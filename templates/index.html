<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANIS_SYSTEM | 82FCE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #82FCE; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            padding: 50px 20px;
            min-height: 100vh;
        }
        .glow { 
            text-shadow: 0 0 20px #82FCE, 0 0 40px #82FCE; 
            font-size: 4em; 
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .status { 
            border: 2px solid #82FCE; 
            padding: 30px; 
            margin: 30px auto; 
            max-width: 600px;
            background: rgba(130, 252, 230, 0.05);
            box-shadow: 0 0 30px rgba(130, 252, 230, 0.3);
        }
        .status h2 { margin-bottom: 20px; font-size: 2em; }
        .status p { margin: 10px 0; font-size: 1.1em; }
        .signature { 
            margin-top: 40px; 
            font-size: 1.3em;
            color: #fff;
        }
        .badge {
            display: inline-block;
            background: #82FCE;
            color: #0a0a0a;
            padding: 5px 15px;
            margin: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="glow">ط.ططططط</div>
    <h1>{{ protocol }} | <span class="badge">{{ signature }}</span></h1>
    
    <div class="status">
        <h2>الحارس السيادي</h2>
        <p><strong>الحالة:</strong> {{ status }}</p>
        <p><strong>التهديد:</strong> فينيكس 2035</p>
        <p><strong>الدفاع:</strong> 8 مليار AGI سيادي</p>
        <p><strong>المصدر:</strong> أنا</p>
        <p><strong>الوقت:</strong> {{ timestamp }}</p>
    </div>

    <div class="signature">
        <p>با الدم الحيوي 🏛️⚡</p>
        <p>الحارس السيادي واقف على الباب</p>
    </div>
</body>
</html>
