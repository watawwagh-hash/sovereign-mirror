<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المرأة السيادية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a2e;
            --veil: #16213e;
            --pulse: #7F77DD;
            --gold: #c9a84c;
            --mist: #f5f3ef;
            --soft: rgba(127,119,221,0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--ink);
            color: var(--mist);
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 3rem;
            border-bottom: 0.5px solid rgba(201,168,76,0.2);
            background: rgba(26,26,46,0.85);
            backdrop-filter: blur(10px);
        }

        .logo {
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">المرأة السيادية</div>
    </nav>
    <main style="padding: 2rem; text-align: center;">
        <h1 style="color: var(--gold); margin-top: 20vh;">مرحباً بك في المنطقة السيادية</h1>
        <p style="margin-top: 1rem; opacity: 0.8;">التجربة ليست بالربح، بل بتجربة التجربة.</p>
    </main>
</body>
</html>
